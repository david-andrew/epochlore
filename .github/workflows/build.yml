name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Deploy the static web app (the shared www/ folder) to GitHub Pages.
  pages:
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Point the "Desktop app" button at this repo's releases
        run: sed -i "s#https://github.com/USER/REPO/releases/latest#https://github.com/${{ github.repository }}/releases/latest#" www/storage.js
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: www
      - id: deploy
        uses: actions/deploy-pages@v4

  # On a version tag, build the Neutralino desktop binaries and attach them to a Release.
  desktop:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install -g @neutralinojs/neu
      - run: neu update
      - run: neu build
      - name: Package desktop bundle
        run: |
          cd dist/epochlore
          zip -r "../../epochlore-desktop-${GITHUB_REF_NAME}.zip" .
      - uses: softprops/action-gh-release@v2
        with:
          files: epochlore-desktop-*.zip
