name: build

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Deploy the static web app (the shared www/ folder) to GitHub Pages.
  pages:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: www
      - id: deploy
        uses: actions/deploy-pages@v4

  # Decide whether a desktop release is needed: the app version lives in
  # neutralino.config.json. Release when that version has no release yet,
  # or whenever the workflow is triggered manually.
  check:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      release: ${{ steps.v.outputs.release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: v
        run: |
          V=$(jq -r .version neutralino.config.json)
          echo "version=$V" >> "$GITHUB_OUTPUT"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "release=true" >> "$GITHUB_OUTPUT"
          elif git rev-parse -q --verify "refs/tags/v$V" >/dev/null; then
            echo "release=false" >> "$GITHUB_OUTPUT"
            echo "Release v$V already exists; nothing to publish."
          else
            echo "release=true" >> "$GITHUB_OUTPUT"
          fi

  # Build the Neutralino desktop binaries and publish them to a Release tagged
  # v<version>, pinned to this commit (so a manual run always ships latest main).
  desktop:
    needs: check
    if: needs.check.outputs.release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install -g @neutralinojs/neu
      - run: neu update
      - run: neu build
      - name: Package per-platform bundles
        run: |
          cd dist/epochlore
          pkg() { local name="$1"; shift; zip -j "../../epochlore-${name}.zip" resources.neu "$@"; }
          pkg linux_x64     epochlore-linux_x64
          pkg linux_arm64   epochlore-linux_arm64
          pkg linux_armhf   epochlore-linux_armhf
          pkg mac_x64       epochlore-mac_x64
          pkg mac_arm64     epochlore-mac_arm64
          pkg mac_universal epochlore-mac_universal
          pkg win_x64       epochlore-win_x64.exe
      - name: Tag this commit as v${{ needs.check.outputs.version }}
        run: |
          git tag -f "v${{ needs.check.outputs.version }}"
          git push -f origin "v${{ needs.check.outputs.version }}"
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check.outputs.version }}
          name: Epochlore v${{ needs.check.outputs.version }}
          # stable, un-versioned asset names so /releases/latest/download/<name> always resolves
          files: epochlore-*.zip
          fail_on_unmatched_files: true
